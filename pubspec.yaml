name: in_app_review_flutter
description: A Flutter plugin for requesting and launching the In-App Review flow on Android and iOS. Supports checking availability and opening the store listing.
version: 1.0.1
homepage: https://github.com/nagarritik/in_app_review_flutter

environment:
  sdk: ^3.10.8
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.ritiknagar.in_app_review_flutter
        pluginClass: InAppReviewFlutterPlugin
      # ios:
      #   pluginClass: InAppReviewFlutterPlugin
